[[headers]]
  for = "/*"
  [headers.values]
    # ✅ Strict Content Security Policy (CSP) - Deny by Default
    Content-Security-Policy = "
      default-src 'none'; 
      script-src 'self' https://unpkg.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; 
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com;
      font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com;
      img-src 'self' https://freesvgillustration.com data:;
      connect-src 'self';
      object-src 'none'; 
      frame-ancestors 'none'; 
      base-uri 'self'; 
      form-action 'self'; 
      upgrade-insecure-requests;"

    # ✅ Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"

    # ✅ Prevent Clickjacking
    X-Frame-Options = "DENY"

    # ✅ Enforce HTTPS (HSTS)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # ✅ Enable XSS Protection
    X-XSS-Protection = "1; mode=block"

    # ✅ Improve Privacy (Referrer Policy)
    Referrer-Policy = "strict-origin-when-cross-origin"

    # ✅ Restrict Permissions
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
