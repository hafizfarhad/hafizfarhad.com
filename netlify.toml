[[headers]]
  for = "/*"
  [headers.values]
    # ✅ Secure Content Security Policy (CSP) - No 'unsafe-inline' or 'data:'
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://trusted-cdn.com; img-src 'self'; style-src 'self' https://fonts.googleapis.com; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;"

    # ✅ Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"

    # ✅ Prevent Clickjacking
    X-Frame-Options = "DENY"

    # ✅ Enforce HTTPS (HSTS)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # ✅ Enable XSS Protection
    X-XSS-Protection = "1; mode=block"

    # ✅ Improve Privacy (Referrer Policy)
    Referrer-Policy = "strict-origin-when-cross-origin"

    # ✅ Restrict Permissions
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

